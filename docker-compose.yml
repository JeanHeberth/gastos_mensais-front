version: '3.8'

services:
  gastos-mensais-front:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gastos-mensais-front
    ports:
      - "3000:80"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/index.html"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

